<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Manager Premium</title>

<style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #050505;
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        color: #fff;
        overflow: hidden; /* Dikunci saat loading */
    }

    /* FULL SCREEN LOADING OVERLAY */
    #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(20px); /* Efek Blur */
        -webkit-backdrop-filter: blur(20px);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.8s ease, visibility 0.8s;
    }

    .loader-content {
        text-align: center;
        padding: 40px;
        border: 1px solid rgba(255, 0, 204, 0.3);
        border-radius: 20px;
        background: rgba(20, 20, 20, 0.5);
    }

    #timer {
        font-size: 5rem;
        font-weight: 900;
        color: #ff00cc;
        text-shadow: 0 0 20px rgba(255, 0, 204, 0.6);
        font-family: monospace;
        margin: 20px 0;
    }

    .loader-text {
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #888;
    }

    /* MAIN CONTENT */
    .container {
        max-width: 1300px;
        margin: auto;
        padding: 20px;
        filter: blur(5px); /* Konten belakang sedikit blur saat awal */
        transition: filter 0.8s ease;
    }

    header {
        text-align: center;
        margin-bottom: 40px;
        padding: 20px;
    }

    h1 {
        font-size: 2.8rem;
        font-weight: 900;
        background: linear-gradient(90deg, #ff00cc, #3333ff, #ff00cc);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGradient 4s linear infinite;
    }

    @keyframes textGradient { to { background-position: 200% center; } }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .card {
        background: #121212;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #222;
        transition: 0.3s;
    }

    .thumb-wrapper {
        position: relative;
        height: 170px;
        background: #1a1a1a;
    }

    .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

    .content { padding: 20px; }

    .v-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; color: #efefef; }

    button {
        background: linear-gradient(45deg, #ff0088, #8800ff);
        color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px;
        font-weight: 800; cursor: pointer; text-transform: uppercase;
    }

    .prog-box { margin-top: 15px; display: none; }
    .prog-bg { background: #222; height: 6px; border-radius: 10px; overflow: hidden; }
    .prog-bar { height: 100%; width: 0%; background: #ff00cc; }

    .link-ready { margin-top: 15px; text-align: center; display: none; font-size: 12px; }
    .link-ready a { color: #00eaff; text-decoration: none; font-weight: bold; }

    .tg-float {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: #0088cc;
        color: white;
        padding: 12px 25px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: bold;
        z-index: 998;
    }
</style>
</head>
<body>

<div id="loading-screen">
    <div class="loader-content">
        <p class="loader-text">Sinkronisasi Database...</p>
        <div id="timer">10</div>
        <p style="color: #555; font-size: 0.8rem;">Mohon tunggu sebentar untuk akses video</p>
    </div>
</div>

<div class="container" id="main-container">
    <header>
        <h1>VIDEO TERBARU</h1>
        <p style="color:#666; letter-spacing: 2px;">UPDATE HARIAN</p>
    </header>

    <div class="grid" id="videoGrid"></div>
</div>

<a href="https://t.me/+JETD3Xsnak1kNTVl" class="tg-float" target="_blank">Join Telegram</a>

<script>
    // TIMER LOGIC 15 * 60
    let timeLeft = 10; // 15 Menit dalam detik
    const timerDisplay = document.getElementById('timer');
    const loadingScreen = document.getElementById('loading-screen');
    const mainContainer = document.getElementById('main-container');

    const countdown = setInterval(() => {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        // Format 00:00
        seconds = seconds < 10 ? '0' + seconds : seconds;
        minutes = minutes < 10 ? '0' + minutes : minutes;

        timerDisplay.innerHTML = `${minutes}:${seconds}`;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            // Selesai Loading
            loadingScreen.style.opacity = "0";
            loadingScreen.style.visibility = "hidden";
            mainContainer.style.filter = "none";
            document.body.style.overflow = "auto";
        }
        timeLeft--;
    }, 1000);

    // VIDEO CONTENT LOGIC
    const thumbnails = [
        "https://image2url.com/r2/default/images/1774975511716-db064f73-722d-4b88-a37e-990102610f21.jpg",
        "https://image2url.com/r2/default/images/1774975544837-c1875e8a-1afd-477c-9831-cab06bb0ecfe.jpg",
        "https://image2url.com/r2/default/images/1774975567288-2aa2df1b-812f-4f70-adbc-5186a41554cc.jpg",
        "https://image2url.com/r2/default/images/1774975601834-b0e5c850-a492-4084-80a0-a7070c177c23.jpg",
        "https://image2url.com/r2/default/images/1774975643320-72b8bb5c-6b58-4859-8731-811ed5681e1b.jpg",
        "https://image2url.com/r2/default/images/1774975762712-d2a2c0d4-1367-41ac-9da9-dd8efcff375f.jpg",
        "https://image2url.com/r2/default/images/1774975984324-531a8356-a3f3-4548-974f-86d65c936e14.jpg",
        "https://image2url.com/r2/default/images/1774976014611-8f506f9c-894a-4bff-a427-b4c81cc06993.jpg",
        "https://image2url.com/r2/default/images/1774976051394-703d62bf-9a32-4017-b331-15302f1c51cf.jpg",
        "https://image2url.com/r2/default/images/1774976081583-b1035d51-b93e-46fd-847e-4359640ca047.jpg"
    ];

    const urls = [
        "video/1.mp4", "video/2.mp4", "video/3.mp4", "video/4.mp4", "video/5.mp4",
        "video/6.mp4", "https://1024terabox.com/s/1j3EdsjJR8qzjIFDr7SWzxQ", "https://1024terabox.com/s/1WHM7ZQ4an_mYy_kT1Gzs2g", "https://1024terabox.com/s/1PzN2dk_nUU7fmfUDU5zUlg", "https://1024terabox.com/s/1T8NfOziMYuHI87y55ow_4g"
    ];

    function init() {
        const grid = document.getElementById('videoGrid');
        let html = '';
        for(let i=0; i<10; i++) {
            html += `
            <div class="card">
                <div class="thumb-wrapper"><img src="${thumbnails[i]}"></div>
                <div class="content">
                    <div class="v-title">Video Part ${i+1}</div>
                    <button id="btn${i}" onclick="download(${i})">Ambil Video</button>
                    <div class="prog-box" id="box${i}">
                        <div class="prog-bg"><div class="prog-bar" id="bar${i}"></div></div>
                    </div>
                    <div class="link-ready" id="link${i}"><a href="${urls[i]}" target="_blank">Simpan File</a></div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    function download(i) {
        const btn = document.getElementById('btn'+i);
        const box = document.getElementById('box'+i);
        const bar = document.getElementById('bar'+i);
        const link = document.getElementById('link'+i);

        btn.disabled = true;
        btn.innerText = "Memproses...";
        box.style.display = "block";

        let p = 0;
        let iv = setInterval(() => {
            p += Math.random() * 10;
            if(p >= 100) {
                p = 100;
                clearInterval(iv);
                btn.innerText = "Tersimpan";
                link.style.display = "block";
                window.open(urls[i], "_blank");
            }
            bar.style.width = p + "%";
        }, 300);
    }

    init();
</script>
</body>
</html>
